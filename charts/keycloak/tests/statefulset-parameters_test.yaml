suite: test service account
templates:
  - templates/statefulset.yaml
tests:
  - it: liveness probe should use /health/live
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health/live
  - it: liveness probe should include the httpRelativePath
    set:
      keycloak:
        httpRelativePath: /auth
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /auth/health/live
  - it: readiness probe should use /health/ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health/ready
  - it: readiness probe should include the httpRelativePath
    set:
      keycloak:
        httpRelativePath: /auth
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /auth/health/ready
  - it: hostname explicitly set should be unchanged
    set:
      keycloak:
        hostname: keycloak.example.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: --hostname=keycloak.example.com
  - it: hostname with template should be rendered
    set:
      keycloak:
        hostname: keycloak.{{ .Values.myDomain }}
      myDomain: mydomain.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: --hostname=keycloak.mydomain.com
  - it: hostnameAdmin explicitly set should be unchanged
    set:
      keycloak:
        hostnameAdmin: keycloak.example.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: --hostname-admin=keycloak.example.com
  - it: hostname with template should be rendered
    set:
      keycloak:
        hostnameAdmin: keycloak.{{ .Values.myDomain }}
      myDomain: mydomain.com
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[2]
          value: --hostname-admin=keycloak.mydomain.com

  # init container resources
  - it: copy-quarkus-lib should render resources when configured
    set:
      initContainers:
        copyQuarkusLib:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: copy-quarkus-lib
      - equal:
          path: spec.template.spec.initContainers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.initContainers[0].resources.requests.memory
          value: 32Mi
      - equal:
          path: spec.template.spec.initContainers[0].resources.limits.memory
          value: 64Mi

  - it: copy-quarkus-lib should render empty resources by default
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: copy-quarkus-lib
      - isEmpty:
          path: spec.template.spec.initContainers[0].resources

  # extraInitContainers tpl support
  - it: extraInitContainers with static image should render unchanged
    set:
      extraInitContainers:
        - name: test-init
          image: myregistry/myimage:1.0.0
          command: ["sh", "-c", "echo hello"]
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: test-init
            image: myregistry/myimage:1.0.0
            command: ["sh", "-c", "echo hello"]
  - it: extraInitContainers should resolve template expressions with global.imageRegistry
    set:
      global:
        imageRegistry: custom.registry.io
      extraInitContainers:
        - name: test-init
          image: '{{ printf "%s/%s:%s" .Values.global.imageRegistry "myimage" "1.0.0" }}'
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: test-init
            image: custom.registry.io/myimage:1.0.0
  - it: extraInitContainers should not render when empty
    set:
      extraInitContainers: []
    asserts:
      - notContains:
          path: spec.template.spec.initContainers
          content:
            name: test-init

  # extraVolumes tpl support
  - it: extraVolumes should resolve template expressions
    set:
      global:
        imageRegistry: custom.registry.io
      myConfigMap: my-custom-config
      extraVolumes:
        - name: '{{ .Values.myConfigMap }}'
          configMap:
            name: '{{ .Values.myConfigMap }}'
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-custom-config
            configMap:
              name: my-custom-config

  # extraVolumeMounts tpl support
  - it: extraVolumeMounts should resolve template expressions
    set:
      myMountName: custom-mount
      extraVolumeMounts:
        - name: '{{ .Values.myMountName }}'
          mountPath: /opt/keycloak/custom
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-mount
            mountPath: /opt/keycloak/custom

  # extraEnvVars tpl support
  - it: extraEnvVars should resolve template expressions
    set:
      mySecretName: my-secret
      extraEnvVars:
        - name: MY_VAR
          valueFrom:
            secretKeyRef:
              name: '{{ .Values.mySecretName }}'
              key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: password
